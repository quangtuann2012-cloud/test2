<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Trang Web Đầu Tiên</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f0f2f5;
            padding-top: 50px;
        }
        h1 {
            color: #2c3e50;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h1>Chào mừng bạn đến với thế giới Code!</h1>
    <p>Đây là trang HTML đơn giản của tôi.</p>
    
    <button onclick="chaoMung()">Nhấn vào đây!</button>

    <script>
        function chaoMung() {
            alert("Chúc mừng! Bạn đã chạy thành công đoạn code HTML đầu tiên.");
        }
    </script>

</body>
</html>
